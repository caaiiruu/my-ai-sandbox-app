<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello AI Sandbox</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #0f1115;
        color: #ffffff;
      }
      .card {
        padding: 32px 40px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 20px;
        background: rgba(255,255,255,0.04);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 40px;
      }
      p {
        margin: 0;
        color: rgba(255,255,255,0.72);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello AI Sandbox</h1>
      <p>Your Vercel + GitHub pipeline is working.</p>
    </div>
  </body>
</html>
